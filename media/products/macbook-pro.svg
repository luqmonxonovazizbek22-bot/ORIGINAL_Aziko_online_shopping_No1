  <rect width="1200" height="900" rx="78" fill="url(#bg)"/>
  <circle cx="190" cy="120" r="280" fill="url(#glow)"/>
  <circle cx="1030" cy="760" r="340" fill="#ffffff" opacity="0.10"/>
  <path d="M98 160 C255 60 405 68 566 130 S894 248 1090 112" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="7"/>
  <path d="M90 740 C270 680 420 765 585 728 S910 620 1108 706" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="5"/>

