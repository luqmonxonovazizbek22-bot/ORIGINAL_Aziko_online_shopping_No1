      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#475569"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="36%" r="62%">
